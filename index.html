<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>3D Car Drive — Single Game</title>
<style>
  :root{
    --bg:#071026;
    --panel:rgba(255,255,255,0.03);
    --accent:#38bdf8;
    --muted:#9ca3af;
    --white:#e6eef8;
  }
  html,body{height:100%;margin:0;background:linear-gradient(180deg,#071026,#020617);font-family:Inter,system-ui,Segoe UI,Roboto,Arial;color:var(--white);-webkit-font-smoothing:antialiased}
  canvas{display:block;width:100vw;height:100vh}
  /* HUD */
  .hud{
    position:fixed;left:16px;top:16px;z-index:50;display:flex;gap:10px;align-items:center;
  }
  .pill{background:var(--panel);border:1px solid rgba(255,255,255,0.04);padding:8px 12px;border-radius:999px;font-weight:700}
  .centerMsg{
    position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:50;
    background:rgba(2,6,23,0.92);border:1px solid rgba(255,255,255,0.04);padding:18px 22px;border-radius:12px;text-align:center;
  }
  .btn{
    background:linear-gradient(90deg,var(--accent),#0ea5e9);color:#021124;border:none;padding:10px 14px;border-radius:10px;font-weight:800;cursor:pointer;
  }
  /* Controls bottom */
  .controls{
    position:fixed;left:0;right:0;bottom:12px;z-index:60;display:flex;justify-content:space-between;padding:0 18px;pointer-events:none;
  }
  .leftControl, .rightControl{display:flex;gap:12px;align-items:center;pointer-events:auto}
  .wheel{
    width:120px;height:120px;border-radius:999px;background:rgba(255,255,255,0.03);border:2px solid rgba(255,255,255,0.06);
    display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--white);touch-action:none;
    box-shadow:0 8px 20px rgba(0,0,0,0.6);
  }
  .pedal{
    width:84px;height:84px;border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);border:1px solid rgba(255,255,255,0.04);
    display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--white);touch-action:none;
    box-shadow:0 8px 20px rgba(0,0,0,0.6);
  }
  .pedal.active{background:linear-gradient(180deg,var(--accent),#0ea5e9);color:#021124}
  .note{position:fixed;left:16px;bottom:16px;color:var(--muted);font-size:13px;z-index:50}
  /* small speedometer */
  .speedometer{position:fixed;right:16px;top:16px;z-index:50;background:var(--panel);padding:8px 12px;border-radius:999px;border:1px solid rgba(255,255,255,0.04);font-weight:700}
</style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="hud">
    <div class="pill" id="gear">Gear: N</div>
    <div class="pill" id="score">Score: 0</div>
  </div>

  <div class="speedometer" id="speed">0 km/h</div>

  <div class="centerMsg" id="menu">
    <div style="font-size:20px;font-weight:800;margin-bottom:8px">3D Car Drive</div>
    <div style="color:var(--muted);margin-bottom:14px">Lenken: Wheel links • Gas / Stop rechts • Touch & Keyboard</div>
    <div><button class="btn" id="startBtn">Start Fahren</button></div>
  </div>

  <div class="controls">
    <div class="leftControl">
      <div class="wheel" id="wheel">Lenken</div>
    </div>
    <div class="rightControl">
      <div class="pedal" id="brake">Stop</div>
      <div class="pedal" id="gas">Gas</div>
    </div>
  </div>

  <div class="note">WASD / Pfeile • Space = Handbremse</div>

<script type="module">
/* 3D Car Drive — single file using three.js (r152+)
   - Low-poly car built from primitives (no external models)
   - Drive physics: throttle, brake, steering, friction
   - Touch wheel (drag) for steering, pedals for gas/brake
   - Camera follows car with smoothing
   - Simple world: ground plane + obstacles + skybox color
   - HUD updates: speed, gear, score
*/

/* -------------------- three.js import -------------------- */
/* Using official CDN for three.js (module) */
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/controls/OrbitControls.js';
/* Note: OrbitControls only used for debug toggle; not for gameplay */

/* -------------------- Setup renderer, scene, camera -------------------- */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x071026);

/* camera */
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 500);
camera.position.set(0, 6, 12);
camera.lookAt(0, 0, 0);

/* resize */
function onResize(){
  const w = innerWidth, h = innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w/h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize);
onResize();

/* -------------------- Lights -------------------- */
const hemi = new THREE.HemisphereLight(0xbfd1ff, 0x202040, 0.6);
scene.add(hemi);

const dir = new THREE.DirectionalLight(0xffffff, 0.9);
dir.position.set(5, 10, 2);
dir.castShadow = true;
dir.shadow.mapSize.set(2048,2048);
dir.shadow.camera.left = -30; dir.shadow.camera.right = 30; dir.shadow.camera.top = 30; dir.shadow.camera.bottom = -30;
dir.shadow.camera.near = 0.5; dir.shadow.camera.far = 100;
scene.add(dir);

/* subtle ambient */
scene.add(new THREE.AmbientLight(0x111122, 0.25));

/* -------------------- Ground -------------------- */
const groundGeo = new THREE.PlaneGeometry(400, 400, 40, 40);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x0f1724, roughness: 0.9, metalness: 0.05 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

/* add subtle grid lines for visual depth */
const gridHelper = new THREE.GridHelper(400, 40, 0x1f2937, 0x0b1220);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

/* -------------------- Simple world objects (obstacles) -------------------- */
const obstacles = [];
const obstacleMat = new THREE.MeshStandardMaterial({ color: 0xd9534f, roughness: 0.7, metalness: 0.1 });
function spawnObstacle(x,z){
  const w = 1 + Math.random()*1.2;
  const h = 0.8 + Math.random()*1.6;
  const d = 0.8 + Math.random()*1.2;
  const g = new THREE.BoxGeometry(w,h,d);
  const m = new THREE.Mesh(g, obstacleMat);
  m.castShadow = true;
  m.receiveShadow = true;
  m.position.set(x, h/2, z);
  scene.add(m);
  obstacles.push(m);
}

/* scatter some obstacles ahead */
for(let i=0;i<60;i++){
  const lane = (Math.floor(Math.random()*3)-1) * 3.0; // lanes -3,0,3
  const z = - (5 + i*6 + Math.random()*4);
  if(Math.random() < 0.45) spawnObstacle(lane, z);
}

/* -------------------- Car model (low-poly) -------------------- */
const car = new THREE.Group();

/* body */
const bodyMat = new THREE.MeshStandardMaterial({ color: 0x1e90ff, roughness: 0.35, metalness: 0.4 });
const bodyGeo = new THREE.BoxGeometry(2.2, 0.6, 4.0);
const body = new THREE.Mesh(bodyGeo, bodyMat);
body.castShadow = true; body.receiveShadow = true;
body.position.y = 0.9;
car.add(body);

/* cabin */
const cabinMat = new THREE.MeshStandardMaterial({ color: 0xbfe8ff, roughness: 0.2, metalness: 0.1 });
const cabinGeo = new THREE.BoxGeometry(1.6, 0.6, 1.8);
const cabin = new THREE.Mesh(cabinGeo, cabinMat);
cabin.position.set(0, 1.25, -0.1);
cabin.castShadow = true;
car.add(cabin);

/* wheels */
const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.6, metalness: 0.2 });
const wheelGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.4, 16);
function makeWheel(x,z){
  const w = new THREE.Mesh(wheelGeo, wheelMat);
  w.rotation.z = Math.PI/2;
  w.position.set(x, 0.45, z);
  w.castShadow = true;
  car.add(w);
  return w;
}
const wheelFL = makeWheel(-0.95, -1.4);
const wheelFR = makeWheel(0.95, -1.4);
const wheelRL = makeWheel(-0.95, 1.4);
const wheelRR = makeWheel(0.95, 1.4);

/* add small bumper */
const bumperGeo = new THREE.BoxGeometry(2.4, 0.2, 0.2);
const bumper = new THREE.Mesh(bumperGeo, bodyMat);
bumper.position.set(0, 0.75, 2.05);
car.add(bumper);

/* initial car position */
car.position.set(0, 0, 0);
car.rotation.y = Math.PI; // face forward (negative z)
scene.add(car);

/* shadow receiver under car */
const carShadow = new THREE.Mesh(new THREE.PlaneGeometry(6,6), new THREE.MeshBasicMaterial({color:0x000000, opacity:0.12, transparent:true}));
carShadow.rotation.x = -Math.PI/2;
carShadow.position.y = 0.01;
car.add(carShadow);

/* -------------------- Driving physics (simple) -------------------- */
let velocity = 0; // forward speed (units/s)
let steerAngle = 0; // radians, negative = left
let throttle = 0; // 0..1
let brake = 0; // 0..1
const maxSpeed = 45; // units/s (tweak)
const accel = 30; // units/s^2
const brakePower = 80;
const friction = 6;
const steerMax = Math.PI/6; // max wheel angle
const steerSpeed = 3.5; // how fast steering responds

/* lanes positions */
const lanePositions = [-3.0, 0.0, 3.0];
let currentLane = 1; // index 0..2
let targetX = lanePositions[currentLane];

/* controls state */
const controls = {
  wheelActive: false,
  wheelStartX: 0,
  wheelAngle: 0,
  gasActive: false,
  brakeActive: false,
  keyLeft: false,
  keyRight: false,
  keyGas: false,
  keyBrake: false
};

/* HUD refs */
const speedEl = document.getElementById('speed');
const gearEl = document.getElementById('gear');
const scoreEl = document.getElementById('score');

/* start menu */
const menuEl = document.getElementById('menu');
const startBtn = document.getElementById('startBtn');
startBtn.addEventListener('click', ()=>{ menuEl.style.display='none'; running = true; lastTime = performance.now(); animate(); });

/* touch wheel handling (drag left/right to steer) */
const wheelEl = document.getElementById('wheel');
let wheelPointerId = null;
wheelEl.addEventListener('pointerdown', (e)=>{
  wheelEl.setPointerCapture(e.pointerId);
  wheelPointerId = e.pointerId;
  controls.wheelActive = true;
  controls.wheelStartX = e.clientX;
  controls.wheelAngle = 0;
});
wheelEl.addEventListener('pointermove', (e)=>{
  if(!controls.wheelActive || e.pointerId !== wheelPointerId) return;
  const dx = e.clientX - controls.wheelStartX;
  // map dx to angle
  const maxPx = 80;
  controls.wheelAngle = clamp(dx / maxPx, -1, 1) * 1.0; // -1..1
  wheelEl.style.transform = `rotate(${controls.wheelAngle * 30}deg)`;
  steerAngle = controls.wheelAngle * steerMax;
});
wheelEl.addEventListener('pointerup', (e)=>{
  if(e.pointerId !== wheelPointerId) return;
  wheelEl.releasePointerCapture(e.pointerId);
  wheelPointerId = null;
  controls.wheelActive = false;
  controls.wheelAngle = 0;
  wheelEl.style.transform = `rotate(0deg)`;
  steerAngle = 0;
});

/* gas / brake pedals */
const gasEl = document.getElementById('gas');
const brakeEl = document.getElementById('brake');
gasEl.addEventListener('pointerdown', ()=>{ controls.gasActive = true; gasEl.classList.add('active'); });
gasEl.addEventListener('pointerup', ()=>{ controls.gasActive = false; gasEl.classList.remove('active'); });
gasEl.addEventListener('pointerleave', ()=>{ controls.gasActive = false; gasEl.classList.remove('active'); });

brakeEl.addEventListener('pointerdown', ()=>{ controls.brakeActive = true; brakeEl.classList.add('active'); });
brakeEl.addEventListener('pointerup', ()=>{ controls.brakeActive = false; brakeEl.classList.remove('active'); });
brakeEl.addEventListener('pointerleave', ()=>{ controls.brakeActive = false; brakeEl.classList.remove('active'); });

/* keyboard controls */
window.addEventListener('keydown', (e)=>{
  if(e.key === 'ArrowLeft' || e.key === 'a') controls.keyLeft = true;
  if(e.key === 'ArrowRight' || e.key === 'd') controls.keyRight = true;
  if(e.key === 'ArrowUp' || e.key === 'w') controls.keyGas = true;
  if(e.key === 'ArrowDown' || e.key === 's') controls.keyBrake = true;
  if(e.key === ' '){ controls.keyBrake = true; } // space as brake/handbrake
});
window.addEventListener('keyup', (e)=>{
  if(e.key === 'ArrowLeft' || e.key === 'a') controls.keyLeft = false;
  if(e.key === 'ArrowRight' || e.key === 'd') controls.keyRight = false;
  if(e.key === 'ArrowUp' || e.key === 'w') controls.keyGas = false;
  if(e.key === 'ArrowDown' || e.key === 's') controls.keyBrake = false;
  if(e.key === ' '){ controls.keyBrake = false; }
});

/* clamp helper */
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

/* -------------------- Camera follow -------------------- */
const camOffset = new THREE.Vector3(0, 4.2, 10);
const camLookOffset = new THREE.Vector3(0, 1.6, 0);

/* -------------------- Game loop -------------------- */
let running = false;
let lastTime = performance.now();
let score = 0;

function animate(now){
  if(!running) return;
  const dt = Math.min(0.05, (now - lastTime) / 1000);
  lastTime = now;

  // input mapping
  throttle = controls.gasActive || controls.keyGas ? 1 : 0;
  brake = controls.brakeActive || controls.keyBrake ? 1 : 0;

  // steering from wheel or keyboard
  if(controls.keyLeft) steerAngle = -steerMax;
  if(controls.keyRight) steerAngle = steerMax;
  if(!controls.keyLeft && !controls.keyRight && !controls.wheelActive){
    // relax steering to 0
    steerAngle *= Math.max(0, 1 - steerSpeed * dt);
  }

  // acceleration/brake physics
  if(throttle > 0){
    velocity += accel * throttle * dt;
  } else if(brake > 0){
    velocity -= brakePower * brake * dt;
  } else {
    // natural friction
    if(velocity > 0) velocity -= friction * dt;
    else velocity += friction * dt;
  }
  // clamp
  velocity = clamp(velocity, -8, maxSpeed);

  // steering affects heading
  const turnRadius = 6.0; // smaller = sharper
  const angularVel = (velocity / turnRadius) * Math.tan(steerAngle);
  car.rotation.y += angularVel * dt;

  // move forward along car's local -Z
  const forward = new THREE.Vector3(0,0,-1).applyQuaternion(car.quaternion);
  car.position.addScaledVector(forward, velocity * dt);

  // simple lane snap: if player taps left/right, we move targetX to lane and lerp
  // detect lane change via keyboard wheel actions (we already set steerAngle)
  // but also allow lane switching by tapping wheel left/right quickly:
  // (we implement lane switching on pointerup if wheel drag was large)
  // For now: if user presses left/right keys, we change lane index
  if(controls.keyLeft && !controls.keyRight){
    // attempt lane change left
    // but only when velocity > small threshold to avoid accidental
    if(velocity > 1 && car.userData.lastLaneChange !== 'left'){
      currentLane = Math.max(0, currentLane - 1);
      car.userData.lastLaneChange = 'left';
      targetX = lanePositions[currentLane];
    }
  } else if(controls.keyRight && !controls.keyLeft){
    if(velocity > 1 && car.userData.lastLaneChange !== 'right'){
      currentLane = Math.min(2, currentLane + 1);
      car.userData.lastLaneChange = 'right';
      targetX = lanePositions[currentLane];
    }
  } else {
    car.userData.lastLaneChange = null;
  }

  // smooth lateral movement to targetX
  car.position.x += (targetX - car.position.x) * clamp(8 * dt, 0, 1);

  // rotate wheels visually
  const wheelSpin = velocity * dt * 6;
  wheelFL.rotation.x -= wheelSpin;
  wheelFR.rotation.x -= wheelSpin;
  wheelRL.rotation.x -= wheelSpin;
  wheelRR.rotation.x -= wheelSpin;

  // simple collision detection with obstacles
  for(let i = obstacles.length - 1; i >= 0; i--){
    const o = obstacles[i];
    const dx = car.position.x - o.position.x;
    const dz = car.position.z - o.position.z;
    const distX = Math.abs(dx);
    const distZ = Math.abs(dz);
    const hitX = distX < 1.6;
    const hitZ = distZ < 1.6;
    if(hitX && hitZ){
      // collision: bounce back and reduce speed
      velocity *= -0.25;
      // remove obstacle and add small score penalty
      scene.remove(o);
      obstacles.splice(i,1);
      score = Math.max(0, score - 20);
      // small visual feedback: flash car color
      body.material.color.set(0xff6b6b);
      setTimeout(()=>body.material.color.set(0x1e90ff), 160);
    }
  }

  // update camera to follow car smoothly
  const desiredCamPos = new THREE.Vector3().copy(car.position).add(camOffset.clone().applyQuaternion(car.quaternion));
  camera.position.lerp(desiredCamPos, 0.12);
  const lookAtPos = new THREE.Vector3().copy(car.position).add(camLookOffset);
  camera.lookAt(lookAtPos);

  // update HUD
  speedEl.textContent = Math.round(velocity * 3.6) + ' km/h';
  gearEl.textContent = velocity > 0.5 ? 'D' : (velocity < -0.5 ? 'R' : 'N');
  scoreEl.textContent = 'Score: ' + Math.floor(score);

  // small auto-spawn obstacles ahead as we drive
  if(Math.random() < 0.02 * (1 + velocity / 20)){
    const lane = Math.floor(Math.random()*3);
    const z = car.position.z - (40 + Math.random()*40);
    spawnObstacle(lanePositions[lane], z);
  }

  // slowly increase score with distance
  score += Math.abs(velocity) * dt * 0.6;

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}

/* helper spawn obstacle function (reused) */
function spawnObstacle(x,z){
  const w = 1 + Math.random()*1.2;
  const h = 0.8 + Math.random()*1.6;
  const d = 0.8 + Math.random()*1.2;
  const g = new THREE.BoxGeometry(w,h,d);
  const m = new THREE.Mesh(g, obstacleMat);
  m.castShadow = true; m.receiveShadow = true;
  m.position.set(x, h/2, z);
  scene.add(m);
  obstacles.push(m);
}

/* clamp helper (again) */
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

/* initial camera and UI */
car.userData = {};
updateHUD();
let lastAnim = null;

/* update HUD function */
function updateHUD(){ speedEl.textContent = '0 km/h'; gearEl.textContent = 'N'; scoreEl.textContent = 'Score: 0'; }

/* debug: OrbitControls toggle (press 'o') */
let orbit = null;
window.addEventListener('keydown', (e)=>{
  if(e.key === 'o'){
    if(!orbit){ orbit = new OrbitControls(camera, renderer.domElement); orbit.target.set(0,1,0); }
    else { orbit.dispose(); orbit = null; }
  }
});

/* start rendering a static frame until user starts */
renderer.render(scene, camera);

/* expose some globals for debugging in console (optional) */
window._car = car;
window._scene = scene;
window._renderer = renderer;

</script>
</body>
</html>
