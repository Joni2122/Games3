<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Portal</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle at top, #1f2937 0, #020617 60%);
    font-family: system-ui;
    color: #e5e7eb;
}

/* HEADER */
header {
    padding: 16px;
    text-align: center;
    font-size: 22px;
    font-weight: 600;
    background: rgba(2,6,23,0.96);
    border-bottom: 1px solid #1f2937;
}

/* GAME GRID */
#gameMenu {
    padding: 18px;
    display: grid;
    gap: 14px;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
}

.gameBtn {
    background: radial-gradient(circle at top, #1f2937 0, #020617 80%);
    border-radius: 16px;
    padding: 22px 10px;
    text-align: center;
    font-size: 18px;
    cursor: pointer;
    border: 1px solid #1f2937;
    box-shadow: 0 10px 20px rgba(15,23,42,0.7);
    transition: 0.18s;
}
.gameBtn span {
    display: block;
    font-size: 30px;
    margin-bottom: 8px;
}
.gameBtn:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 16px 30px rgba(15,23,42,0.9);
    border-color: #38bdf8;
}

/* FULLSCREEN GAME */
#gameScreen {
    position: fixed;
    inset: 0;
    background: #000;
    display: none;
    flex-direction: column;
}

#topBar {
    padding: 10px 14px;
    background: rgba(2,6,23,0.96);
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #1f2937;
    font-size: 16px;
}

#backBtn {
    background: #1f2937;
    padding: 6px 12px;
    border-radius: 999px;
    cursor: pointer;
    border: 1px solid #111827;
    font-size: 14px;
}
#backBtn:hover {
    background: #111827;
}

canvas {
    flex: 1;
    background: #000;
    touch-action: none;
    display: block;
}
</style>
</head>

<body>

<header>🎮 Games</header>

<!-- GAME MENU -->
<div id="gameMenu"></div>

<!-- FULLSCREEN GAME -->
<div id="gameScreen">
    <div id="topBar">
        <div id="gameTitle">Game</div>
        <div id="backBtn">⬅</div>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
/* ===========================
   GAME LIST (10 GAMES)
=========================== */
const games = [
    { id:"snake",    name:"Snake",          icon:"🐍" },
    { id:"flappy",   name:"Flappy",         icon:"🐤" },
    { id:"pong",     name:"Pong",           icon:"🏓" },
    { id:"breakout", name:"Breakout",       icon:"🧱" },
    { id:"cardodge", name:"Car Dodge",      icon:"🚗" },
    { id:"space",    name:"Space",          icon:"🚀" },
    { id:"aim",      name:"Aim",            icon:"🎯" },
    { id:"reaction", name:"Reaction",       icon:"⚡" },
    { id:"memory",   name:"Memory",         icon:"🧠" },
    { id:"clicker",  name:"Clicker",        icon:"💰" }
];

/* MENU RENDER */
const menu = document.getElementById("gameMenu");
games.forEach(g=>{
    let b=document.createElement("div");
    b.className="gameBtn";
    b.innerHTML=`<span>${g.icon}</span>${g.name}`;
    b.onclick=()=>startGame(g.id, g.name + " " + g.icon);
    menu.appendChild(b);
});

/* FULLSCREEN HANDLING */
const screen = document.getElementById("gameScreen");
const title = document.getElementById("gameTitle");
const back = document.getElementById("backBtn");
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

back.onclick = ()=>closeGame();

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight - 50;
}
window.onresize = resizeCanvas;

let currentGame = null;

function startGame(id, name){
    screen.style.display="flex";
    title.innerText=name;
    resizeCanvas();

    currentGame = null;
    if(id==="snake")    loadSnake();
    if(id==="flappy")   loadFlappy();
    if(id==="pong")     loadPong();
    if(id==="breakout") loadBreakout();
    if(id==="cardodge") loadCarDodge();
    if(id==="space")    loadSpace();
    if(id==="aim")      loadAim();
    if(id==="reaction") loadReaction();
    if(id==="memory")   loadMemory();
    if(id==="clicker")  loadClicker();
}

function closeGame(){
    currentGame = null;
    screen.style.display="none";
}

/* ===========================
   SNAKE
=========================== */
function loadSnake(){
    let grid=20;
    let snake=[{x:5,y:5}];
    let dir={x:1,y:0};
    let food={x:10,y:10};

    document.onkeydown=e=>{
        if(e.key==="ArrowUp"   && dir.y!==1)  dir={x:0,y:-1};
        if(e.key==="ArrowDown" && dir.y!==-1) dir={x:0,y:1};
        if(e.key==="ArrowLeft" && dir.x!==1)  dir={x:-1,y:0};
        if(e.key==="ArrowRight"&& dir.x!==-1) dir={x:1,y:0};
    };

    canvas.ontouchstart = e=>{
        let t=e.touches[0];
        let cx=t.clientX, cy=t.clientY;
        let mx=canvas.width/2, my=canvas.height/2;
        if(Math.abs(cx-mx)>Math.abs(cy-my)){
            dir = cx>mx ? {x:1,y:0} : {x:-1,y:0};
        } else {
            dir = cy>my ? {x:0,y:1} : {x:0,y:-1};
        }
    };

    currentGame = function loop(){
        if(!currentGame) return;

        ctx.fillStyle="black";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        let head={x:snake[0].x+dir.x, y:snake[0].y+dir.y};
        snake.unshift(head);

        if(head.x===food.x && head.y===food.y){
            food={x:Math.floor(Math.random()*20),y:Math.floor(Math.random()*20)};
        } else snake.pop();

        ctx.fillStyle="lime";
        snake.forEach(s=>ctx.fillRect(s.x*grid,s.y*grid,grid-1,grid-1));

        ctx.fillStyle="red";
        ctx.fillRect(food.x*grid,food.y*grid,grid-1,grid-1);

        requestAnimationFrame(loop);
    };
    currentGame();
}

/* ===========================
   FLAPPY
=========================== */
function loadFlappy(){
    let y=canvas.height/2;
    let v=0;
    let pipes=[];
    let gap=120;
    let frame=0;

    function tap(){ v=-8; }
    document.onkeydown=e=>{ if(e.key===" "){tap();} };
    canvas.ontouchstart = ()=>tap();

    currentGame = function loop(){
        if(!currentGame) return;

        frame++;
        ctx.fillStyle="#020617";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        if(frame%80===0){
            let top = 50+Math.random()*(canvas.height-200);
            pipes.push({x:canvas.width, top:top});
        }

        v+=0.5;
        y+=v;

        ctx.fillStyle="yellow";
        ctx.fillRect(80,y,24,24);

        ctx.fillStyle="#22c55e";
        pipes.forEach(p=>{
            p.x-=3;
            ctx.fillRect(p.x,0,40,p.top-gap/2);
            ctx.fillRect(p.x,p.top+gap/2,40,canvas.height);
        });

        requestAnimationFrame(loop);
    };
    currentGame();
}

/* ===========================
   PONG
=========================== */
function loadPong(){
    let py=canvas.height/2-40;
    let bx=canvas.width/2, by=canvas.height/2;
    let dx=4, dy=3;

    canvas.onmousemove = e=>{
        let rect=canvas.getBoundingClientRect();
        py = e.clientY-rect.top-40;
    };
    canvas.ontouchmove = e=>{
        let t=e.touches[0];
        let rect=canvas.getBoundingClientRect();
        py = t.clientY-rect.top-40;
    };

    currentGame = function loop(){
        if(!currentGame) return;

        ctx.fillStyle="black";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        bx+=dx; by+=dy;
        if(by<0||by>canvas.height) dy*=-1;
        if(bx<20 && by>py && by<py+80) dx*=-1;
        if(bx>canvas.width) {bx=canvas.width/2;by=canvas.height/2;}

        ctx.fillStyle="white";
        ctx.fillRect(10,py,10,80);
        ctx.fillRect(bx-5,by-5,10,10);

        requestAnimationFrame(loop);
    };
    currentGame();
}

/* ===========================
   BREAKOUT
=========================== */
function loadBreakout(){
    let bx=canvas.width/2, by=canvas.height/2;
    let dx=3, dy=-3;
    let pw=80, px=canvas.width/2-pw/2;
    let bricks=[];
    let rows=4, cols=8, bw=canvas.width/cols, bh=20;

    for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){
            bricks.push({x:c*bw,y:60+r*bh,w:bw-2,h:bh-2,alive:true});
        }
    }

    canvas.onmousemove = e=>{
        let rect=canvas.getBoundingClientRect();
        px = e.clientX-rect.left-pw/2;
    };
    canvas.ontouchmove = e=>{
        let t=e.touches[0];
        let rect=canvas.getBoundingClientRect();
        px = t.clientX-rect.left-pw/2;
    };

    currentGame = function loop(){
        if(!currentGame) return;

        ctx.fillStyle="black";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        bx+=dx; by+=dy;
        if(bx<0||bx>canvas.width) dx*=-1;
        if(by<0) dy*=-1;
        if(by>canvas.height){
            bx=canvas.width/2;by=canvas.height/2;
        }

        if(by>canvas.height-30 && bx>px && bx<px+pw) dy*=-1;

        bricks.forEach(b=>{
            if(!b.alive) return;
            if(bx>b.x && bx<b.x+b.w && by>b.y && by<b.y+b.h){
                b.alive=false;
                dy*=-1;
            }
        });

        ctx.fillStyle="#38bdf8";
        ctx.fillRect(px,canvas.height-20,pw,10);

        ctx.fillStyle="#f97316";
        ctx.fillRect(bx-5,by-5,10,10);

        ctx.fillStyle="#e5e7eb";
        bricks.forEach(b=>{
            if(b.alive) ctx.fillRect(b.x,b.y,b.w,b.h);
        });

        requestAnimationFrame(loop);
    };
    currentGame();
}

/* ===========================
   CAR DODGE
=========================== */
function loadCarDodge(){
    let x=canvas.width/2;
    let obs=[];

    document.onkeydown=e=>{
        if(e.key==="ArrowLeft") x-=20;
        if(e.key==="ArrowRight") x+=20;
    };
    canvas.ontouchmove = e=>{
        let t=e.touches[0];
        let rect=canvas.getBoundingClientRect();
        x = t.clientX-rect.left;
    };

    currentGame = function loop(){
        if(!currentGame) return;

        ctx.fillStyle="black";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        if(Math.random()<0.05) obs.push({x:Math.random()*canvas.width,y:-20});

        ctx.fillStyle="#22c55e";
        ctx.fillRect(x-10,canvas.height-40,20,30);

        ctx.fillStyle="#f97316";
        obs.forEach(o=>{
            o.y+=4;
            ctx.fillRect(o.x-10,o.y-10,20,20);
        });

        requestAnimationFrame(loop);
    };
    currentGame();
}

/* ===========================
   SPACE SHOOTER
=========================== */
function loadSpace(){
    let x=canvas.width/2;
    let bullets=[];
    let stars=[];
    for(let i=0;i<60;i++){
        stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height});
    }

    document.onkeydown=e=>{
        if(e.key==="ArrowLeft") x-=15;
        if(e.key==="ArrowRight") x+=15;
        if(e.key===" ") bullets.push({x:x,y:canvas.height-40});
    };
    canvas.ontouchmove = e=>{
        let t=e.touches[0];
        let rect=canvas.getBoundingClientRect();
        x = t.clientX-rect.left;
    };
    canvas.ontouchstart = ()=>bullets.push({x:x,y:canvas.height-40});

    currentGame = function loop(){
        if(!currentGame) return;

        ctx.fillStyle="black";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        ctx.fillStyle="white";
        stars.forEach(s=>{
            s.y+=1;
            if(s.y>canvas.height) s.y=0;
            ctx.fillRect(s.x,s.y,2,2);
        });

        ctx.fillStyle="#38bdf8";
        ctx.fillRect(x-12,canvas.height-40,24,30);

        ctx.fillStyle="#facc15";
        bullets.forEach(b=>{
            b.y-=6;
            ctx.fillRect(b.x-2,b.y-10,4,10);
        });

        requestAnimationFrame(loop);
    };
    currentGame();
}

/* ===========================
   AIM TRAINER
=========================== */
function loadAim(){
    let target={x:200,y:200,r:25};
    let score=0;

    function newTarget(){
        target.x = 40+Math.random()*(canvas.width-80);
        target.y = 60+Math.random()*(canvas.height-120);
    }

    function hit(x,y){
        let dx=x-target.x;
        let dy=y-target.y;
        if(Math.sqrt(dx*dx+dy*dy)<target.r){
            score++;
            newTarget();
        }
    }

    canvas.onclick = e=>hit(e.offsetX,e.offsetY);
    canvas.ontouchstart = e=>{
        let t=e.touches[0];
        let rect=canvas.getBoundingClientRect();
        hit(t.clientX-rect.left,t.clientY-rect.top);
    };

    currentGame = function loop(){
        if(!currentGame) return;

        ctx.fillStyle="black";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        ctx.fillStyle="white";
        ctx.font="20px Arial";
        ctx.fillText(score,20,30);

        ctx.beginPath();
        ctx.arc(target.x,target.y,target.r,0,Math.PI*2);
        ctx.fillStyle="#ef4444";
        ctx.fill();

        requestAnimationFrame(loop);
    };
    currentGame();
}

/* ===========================
   REACTION
=========================== */
function loadReaction(){
    let waiting=true;
    let startTime=0;
    let msg="...";

    function start(){
        waiting=true;
        msg="...";
        ctx.fillStyle="black";
        ctx.fillRect(0,0,canvas.width,canvas.height);
        setTimeout(()=>{
            waiting=false;
            startTime=performance.now();
            msg="GO!";
        },1000+Math.random()*2000);
    }

    canvas.onclick = ()=>{
        if(!waiting){
            let t=performance.now()-startTime;
            msg=t.toFixed(0)+"ms";
            setTimeout(start,1000);
        }
    };
    canvas.ontouchstart = canvas.onclick;

    start();

    currentGame = function loop(){
        if(!currentGame) return;

        ctx.fillStyle=waiting?"#111827":"#16a34a";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        ctx.fillStyle="white";
        ctx.font="40px Arial";
        ctx.fillText(msg,20,60);

        requestAnimationFrame(loop);
    };
    currentGame();
}

/* ===========================
   MEMORY
=========================== */
function loadMemory(){
    let nums=[1,2,3,4,5].sort(()=>Math.random()-0.5);
    let index=0;
    let show=true;
    let timer=0;

    canvas.onclick = ()=>{
        if(!show){
