<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>3D Car Drive — Drive & Destroy</title>
<style>
  :root{
    --bg:#071026;
    --panel:rgba(255,255,255,0.03);
    --accent:#38bdf8;
    --muted:#9ca3af;
    --white:#e6eef8;
  }
  html,body{height:100%;margin:0;background:linear-gradient(180deg,#071026,#020617);font-family:Inter,system-ui,Segoe UI,Roboto,Arial;color:var(--white);-webkit-font-smoothing:antialiased}
  canvas{display:block;width:100vw;height:100vh}
  .hud{position:fixed;left:16px;top:16px;z-index:50;display:flex;gap:10px;align-items:center}
  .pill{background:var(--panel);border:1px solid rgba(255,255,255,0.04);padding:8px 12px;border-radius:999px;font-weight:700}
  .speed{position:fixed;right:16px;top:16px;z-index:50;background:var(--panel);padding:8px 12px;border-radius:999px;border:1px solid rgba(255,255,255,0.04);font-weight:700}
  .controls{position:fixed;left:0;right:0;bottom:12px;z-index:60;display:flex;justify-content:space-between;padding:0 18px;pointer-events:none}
  .leftControl,.rightControl{display:flex;gap:12px;align-items:center;pointer-events:auto}
  .wheel{width:120px;height:120px;border-radius:999px;background:rgba(255,255,255,0.03);border:2px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--white);touch-action:none;box-shadow:0 8px 20px rgba(0,0,0,0.6)}
  .pedal{width:84px;height:84px;border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);border:1px solid rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--white);touch-action:none;box-shadow:0 8px 20px rgba(0,0,0,0.6)}
  .pedal.active{background:linear-gradient(180deg,var(--accent),#0ea5e9);color:#021124}
  .centerMsg{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:50;background:rgba(2,6,23,0.92);border:1px solid rgba(255,255,255,0.04);padding:18px 22px;border-radius:12px;text-align:center}
  .btn{background:linear-gradient(90deg,var(--accent),#0ea5e9);color:#021124;border:none;padding:10px 14px;border-radius:10px;font-weight:800;cursor:pointer}
  .note{position:fixed;left:16px;bottom:16px;color:var(--muted);font-size:13px;z-index:50}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div class="hud">
  <div class="pill" id="gear">Gear: N</div>
  <div class="pill" id="score">Score: 0</div>
</div>
<div class="speed" id="speed">0 km/h</div>

<div class="centerMsg" id="menu" style="display:none">
  <div style="font-size:20px;font-weight:800;margin-bottom:8px" id="menuTitle">3D Car Drive</div>
  <div style="color:var(--muted);margin-bottom:14px">Lenken: Wheel links • Gas / Stop rechts • Touch & Keyboard</div>
  <div><button class="btn" id="startBtn">Start</button></div>
</div>

<div class="controls">
  <div class="leftControl">
    <div class="wheel" id="wheel">Lenken</div>
  </div>
  <div class="rightControl">
    <div class="pedal" id="brake">Stop</div>
    <div class="pedal" id="gas">Gas</div>
  </div>
</div>

<div class="note">WASD / Pfeile • Space = Handbremse</div>

<script type="module">
/* Full single-file 3D car drive game
   - three.js (module) via CDN
   - drive in a world, crash and destroy obstacles
   - touch wheel left, gas/brake right, keyboard support
   - game auto-starts (user interaction required on mobile for audio/canvas focus)
*/

/* Import three.js */
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/loaders/GLTFLoader.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/controls/OrbitControls.js';

/* Renderer, scene, camera */
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x071026);

/* Camera */
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 6, 12);
camera.lookAt(0, 0, 0);

/* Resize */
function resize(){
  const w = innerWidth, h = innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w/h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

/* Lights */
const hemi = new THREE.HemisphereLight(0xbfd1ff, 0x202040, 0.6);
scene.add(hemi);
const dir = new THREE.DirectionalLight(0xffffff, 0.9);
dir.position.set(5, 10, 2);
dir.castShadow = true;
dir.shadow.mapSize.set(2048,2048);
dir.shadow.camera.left = -60; dir.shadow.camera.right = 60; dir.shadow.camera.top = 60; dir.shadow.camera.bottom = -60;
dir.shadow.camera.near = 0.5; dir.shadow.camera.far = 200;
scene.add(dir);
scene.add(new THREE.AmbientLight(0x111122, 0.25));

/* Ground */
const groundMat = new THREE.MeshStandardMaterial({ color: 0x0f1724, roughness: 0.95, metalness: 0.02 });
const groundGeo = new THREE.PlaneGeometry(2000, 2000, 40, 40);
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

/* Grid helper for depth */
const grid = new THREE.GridHelper(400, 80, 0x1f2937, 0x0b1220);
grid.position.y = 0.01;
scene.add(grid);

/* World: simple environment objects */
const obstacleMat = new THREE.MeshStandardMaterial({ color: 0xd9534f, roughness: 0.7, metalness: 0.1 });
const worldObjects = [];
function spawnObstacleAt(x,z){
  const w = 1 + Math.random()*1.6;
  const h = 0.8 + Math.random()*2.0;
  const d = 0.8 + Math.random()*1.6;
  const geo = new THREE.BoxGeometry(w,h,d);
  const m = new THREE.Mesh(geo, obstacleMat);
  m.castShadow = true; m.receiveShadow = true;
  m.position.set(x, h/2, z);
  scene.add(m);
  worldObjects.push(m);
  return m;
}

/* scatter obstacles in a wide area */
for(let i=0;i<200;i++){
  if(Math.random() < 0.45){
    const lane = (Math.floor(Math.random()*5)-2) * 3.0; // lanes -6,-3,0,3,6
    const z = - (5 + Math.random()*600);
    spawnObstacleAt(lane, z);
  }
}

/* Car model (low-poly, built from primitives) */
const car = new THREE.Group();
const bodyMat = new THREE.MeshStandardMaterial({ color: 0x1e90ff, roughness: 0.35, metalness: 0.4 });
const bodyGeo = new THREE.BoxGeometry(2.4, 0.6, 4.2);
const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
bodyMesh.castShadow = true; bodyMesh.receiveShadow = true;
bodyMesh.position.y = 0.9;
car.add(bodyMesh);

const cabinMat = new THREE.MeshStandardMaterial({ color: 0xbfe8ff, roughness: 0.2, metalness: 0.1 });
const cabinGeo = new THREE.BoxGeometry(1.6, 0.6, 1.8);
const cabinMesh = new THREE.Mesh(cabinGeo, cabinMat);
cabinMesh.position.set(0, 1.25, -0.1);
cabinMesh.castShadow = true;
car.add(cabinMesh);

const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.6, metalness: 0.2 });
const wheelGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.4, 16);
function addWheel(x,z){
  const w = new THREE.Mesh(wheelGeo, wheelMat);
  w.rotation.z = Math.PI/2;
  w.position.set(x, 0.45, z);
  w.castShadow = true;
  car.add(w);
  return w;
}
const wheelFL = addWheel(-1.05, -1.6);
const wheelFR = addWheel(1.05, -1.6);
const wheelRL = addWheel(-1.05, 1.6);
const wheelRR = addWheel(1.05, 1.6);

car.position.set(0,0,0);
car.rotation.y = Math.PI; // face -Z
scene.add(car);

/* small shadow plane under car */
const shadowMat = new THREE.MeshBasicMaterial({ color:0x000000, transparent:true, opacity:0.12 });
const shadowPlane = new THREE.Mesh(new THREE.PlaneGeometry(6,6), shadowMat);
shadowPlane.rotation.x = -Math.PI/2;
shadowPlane.position.y = 0.01;
car.add(shadowPlane);

/* Driving physics variables */
let velocity = 0; // forward speed (units/s)
let steer = 0; // -1..1
let throttle = 0; // 0..1
let braking = 0; // 0..1
const MAX_SPEED = 60;
const ACCEL = 40;
const BRAKE_POWER = 120;
const FRICTION = 8;
const STEER_MAX = Math.PI/6;
const TURN_INFLUENCE = 0.9;

/* lanes for lane snapping (optional) */
const lanePositions = [-6, -3, 0, 3, 6];
let currentLane = 2; // index in lanePositions
let targetX = lanePositions[currentLane];

/* controls state */
const controls = {
  wheelActive: false,
  wheelStartX: 0,
  wheelAngle: 0,
  gasActive: false,
  brakeActive: false,
  keyLeft: false,
  keyRight: false,
  keyGas: false,
  keyBrake: false
};

/* HUD refs */
const speedEl = document.getElementById('speed');
const gearEl = document.getElementById('gear');
const scoreEl = document.getElementById('score');
const menuEl = document.getElementById('menu');
const startBtn = document.getElementById('startBtn');
const wheelEl = document.getElementById('wheel');
const gasEl = document.getElementById('gas');
const brakeEl = document.getElementById('brake');

/* start immediately (user interaction required on mobile for some browsers) */
menuEl.style.display = 'none';
let running = true;

/* wheel pointer handling */
let wheelPointerId = null;
wheelEl.addEventListener('pointerdown', (e)=>{
  wheelEl.setPointerCapture(e.pointerId);
  wheelPointerId = e.pointerId;
  controls.wheelActive = true;
  controls.wheelStartX = e.clientX;
  controls.wheelAngle = 0;
});
wheelEl.addEventListener('pointermove', (e)=>{
  if(!controls.wheelActive || e.pointerId !== wheelPointerId) return;
  const dx = e.clientX - controls.wheelStartX;
  const maxPx = 120;
  controls.wheelAngle = clamp(dx / maxPx, -1, 1);
  wheelEl.style.transform = `rotate(${controls.wheelAngle * 30}deg)`;
  steer = controls.wheelAngle;
});
wheelEl.addEventListener('pointerup', (e)=>{
  if(e.pointerId !== wheelPointerId) return;
  wheelEl.releasePointerCapture(e.pointerId);
  wheelPointerId = null;
  controls.wheelActive = false;
  controls.wheelAngle = 0;
  wheelEl.style.transform = `rotate(0deg)`;
  steer = 0;
});

/* pedals */
gasEl.addEventListener('pointerdown', ()=>{ controls.gasActive = true; gasEl.classList.add('active'); });
gasEl.addEventListener('pointerup', ()=>{ controls.gasActive = false; gasEl.classList.remove('active'); });
gasEl.addEventListener('pointerleave', ()=>{ controls.gasActive = false; gasEl.classList.remove('active'); });

brakeEl.addEventListener('pointerdown', ()=>{ controls.brakeActive = true; brakeEl.classList.add('active'); });
brakeEl.addEventListener('pointerup', ()=>{ controls.brakeActive = false; brakeEl.classList.remove('active'); });
brakeEl.addEventListener('pointerleave', ()=>{ controls.brakeActive = false; brakeEl.classList.remove('active'); });

/* keyboard */
window.addEventListener('keydown', (e)=>{
  if(e.key === 'ArrowLeft' || e.key === 'a') controls.keyLeft = true;
  if(e.key === 'ArrowRight' || e.key === 'd') controls.keyRight = true;
  if(e.key === 'ArrowUp' || e.key === 'w') controls.keyGas = true;
  if(e.key === 'ArrowDown' || e.key === 's') controls.keyBrake = true;
  if(e.key === ' '){ controls.keyBrake = true; }
});
window.addEventListener('keyup', (e)=>{
  if(e.key === 'ArrowLeft' || e.key === 'a') controls.keyLeft = false;
  if(e.key === 'ArrowRight' || e.key === 'd') controls.keyRight = false;
  if(e.key === 'ArrowUp' || e.key === 'w') controls.keyGas = false;
  if(e.key === 'ArrowDown' || e.key === 's') controls.keyBrake = false;
  if(e.key === ' '){ controls.keyBrake = false; }
});

/* lane switching via quick taps on wheel (left/right) */
let lastTapX = null;
wheelEl.addEventListener('click', (e)=>{
  const x = e.clientX;
  if(lastTapX === null){ lastTapX = x; setTimeout(()=> lastTapX = null, 300); return; }
  const dx = x - lastTapX;
  if(dx < -30){ currentLane = Math.max(0, currentLane - 1); targetX = lanePositions[currentLane]; }
  if(dx > 30){ currentLane = Math.min(lanePositions.length-1, currentLane + 1); targetX = lanePositions[currentLane]; }
  lastTapX = null;
});

/* clamp helper */
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

/* collision & destruction */
function checkCollisions(){
  const carBox = new THREE.Box3().setFromObject(car);
  for(let i = worldObjects.length - 1; i >= 0; i--){
    const obj = worldObjects[i];
    const box = new THREE.Box3().setFromObject(obj);
    if(box.intersectsBox(carBox)){
      // destroy object: remove from scene and worldObjects
      scene.remove(obj);
      worldObjects.splice(i,1);
      // feedback: reduce speed, add score, flash
      velocity *= -0.25;
      score = Math.max(0, score - 10);
      bodyMesh.material.color.set(0xff6b6b);
      setTimeout(()=> bodyMesh.material.color.set(0x1e90ff), 160);
    }
  }
}

/* HUD & score */
let score = 0;
function updateHUD(){
  speedEl.textContent = Math.round(Math.abs(velocity) * 3.6) + ' km/h';
  gearEl.textContent = velocity > 0.5 ? 'D' : (velocity < -0.5 ? 'R' : 'N');
  scoreEl.textContent = 'Score: ' + Math.floor(score);
}

/* camera follow */
const camOffset = new THREE.Vector3(0, 5.0, 12);
const camLookOffset = new THREE.Vector3(0, 1.6, 0);

/* animate loop */
let lastTime = performance.now();
function animate(now){
  const dt = Math.min(0.05, (now - lastTime) / 1000);
  lastTime = now;

  // input mapping
  throttle = (controls.gasActive || controls.keyGas) ? 1 : 0;
  braking = (controls.brakeActive || controls.keyBrake) ? 1 : 0;
  // keyboard steering if wheel not used
  if(!controls.wheelActive){
    if(controls.keyLeft && !controls.keyRight) steer = -1;
    else if(controls.keyRight && !controls.keyLeft) steer = 1;
    else steer *= Math.max(0, 1 - 6 * dt); // relax
  }

  // acceleration / braking
  if(throttle > 0){
    velocity += ACCEL * throttle * dt;
  } else if(braking > 0){
    velocity -= BRAKE_POWER * braking * dt;
  } else {
    // friction
    if(velocity > 0) velocity -= FRICTION * dt;
    else velocity += FRICTION * dt;
  }
  velocity = clamp(velocity, -12, MAX_SPEED);

  // steering influences rotation
  const steerAngle = steer * STEER_MAX;
  const angularVel = (velocity / 6.0) * Math.tan(steerAngle) * TURN_INFLUENCE;
  car.rotation.y += angularVel * dt;

  // forward vector
  const forward = new THREE.Vector3(0,0,-1).applyQuaternion(car.quaternion);
  car.position.addScaledVector(forward, velocity * dt);

  // lane lateral smoothing to targetX
  car.position.x += (targetX - car.position.x) * clamp(6 * dt, 0, 1);

  // wheel spin
  const spin = velocity * dt * 6;
  wheelFL.rotation.x -= spin; wheelFR.rotation.x -= spin; wheelRL.rotation.x -= spin; wheelRR.rotation.x -= spin;

  // collisions with world objects
  checkCollisions();

  // camera follow smoothing
  const desiredCam = new THREE.Vector3().copy(car.position).add(camOffset.clone().applyQuaternion(car.quaternion));
  camera.position.lerp(desiredCam, 0.12);
  const lookAt = new THREE.Vector3().copy(car.position).add(camLookOffset);
  camera.lookAt(lookAt);

  // spawn new obstacles ahead occasionally
  if(Math.random() < 0.02 * (1 + Math.abs(velocity)/30)){
    const lane = Math.floor(Math.random()*5);
    const z = car.position.z - (40 + Math.random()*80);
    spawnObstacleAt(lanePositions[lane], z);
  }

  // score increases with distance
  score += Math.abs(velocity) * dt * 0.6;

  updateHUD();
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}

/* start immediately */
lastTime = performance.now();
requestAnimationFrame(animate);

/* expose some debug */
window._scene = scene;
window._car = car;

/* helper: spawn a few destructible objects near player for immediate interaction */
(function seedNear(){
  for(let i=1;i<=8;i++){
    const lane = (Math.floor(Math.random()*5)-2) * 3.0;
    spawnObstacleAt(lane, - (5 + i*6 + Math.random()*4));
  }
})();

/* utility clamp */
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

/* ensure canvas is focused for keyboard */
canvas.tabIndex = 0;
canvas.style.outline = 'none';
canvas.focus();

</script>
</body>
</html>
